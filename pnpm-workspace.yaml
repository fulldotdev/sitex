packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  "@base-ui/react": ^1.5.0
  vaul: ^1.1.2
  input-otp: ^1.4.2
  react-resizable-panels: ^4.11.2
  sonner: ^2.0.7
  next-themes: ^0.4.6
  react-day-picker: ^10.0.1
  date-fns: ^4.4.0
  embla-carousel-react: ^8.6.0
  recharts: 3.8.0
  cmdk: ^1.1.1
  prettier: ^3.8.3
  "@ianvs/prettier-plugin-sort-imports": ^4.7.1
  prettier-plugin-tailwindcss: ^0.8.0

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

allowBuilds:
  esbuild: true
  msw: true
