packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^26.1.0
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@^0.2.3
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: ^0.2.3
  "@base-ui/react": ^1.6.0
  prettier: ^3.8.3
  "@ianvs/prettier-plugin-sort-imports": ^4.7.1
  prettier-plugin-tailwindcss: ^0.8.0
  html-minifier-next: ^6.2.8
  satteri: ^0.9.4
  yaml: ^2.9.0
  schema-dts: ^2.0.0
  parse5: ^8.0.1
  "@changesets/changelog-github": ^0.7.0
  "@changesets/cli": ^2.31.0
  "@tailwindcss/vite": ^4.3.2
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.3
  shadcn: ^4.13.0
  tailwindcss: ^4.3.2
  "@fontsource-variable/geist": ^5.2.9
  "@shikijs/core": ^4.3.1
  "@shikijs/engine-javascript": ^4.3.1
  "@shikijs/langs": ^4.3.1
  "@shikijs/themes": ^4.3.1
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  lucide-react: ^1.23.0
  react: ^19.2.7
  react-dom: ^19.2.7
  tailwind-merge: ^3.6.0
  tw-animate-css: ^1.4.0
  fast-glob: ^3.3.3

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

allowBuilds:
  esbuild: true
  msw: true
